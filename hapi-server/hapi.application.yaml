spring:
  datasource:
    url: 'jdbc:h2:mem:test_mem'
    username: sa
    password: null
    driverClassName: org.h2.Driver
    max-active: 15

  jpa:
    properties:
      hibernate.search.model_mapping: ca.uhn.fhir.jpa.search.HapiHSearchAnalysisConfigurer
      hibernate.search.enabled: true
      hibernate.search.backend.type: lucene
      hibernate.search.backend.analysis.configurer: ca.uhn.fhir.jpa.search.HapiHSearchAnalysisConfigurer
      hibernate.search.backend.directory.type: local-heap
      hibernate.search.backend.lucene_version: lucene_current

hapi:
  fhir:
    ### FHIR Version
    fhir_version: R4

    ### Enable Web UI
    narratives_enabled: true

    ### Server Base Path
    server_address: http://localhost:8080/fhir

    ### CORS Configuration - IMPORTANT for Vercel
    cors:
      enabled: true
      allowed_origin:
        - '*'

    ### Allow external references
    allow_external_references: true

    ### Validation
    validation:
      requests_enabled: false
      responses_enabled: false

    ### Search features
    allow_contains_searches: true
    allow_multiple_delete: true

    ### Subscription
    subscription:
      resthook_enabled: false
      websocket_enabled: false

    ### Bulk export
    bulk_export_enabled: false
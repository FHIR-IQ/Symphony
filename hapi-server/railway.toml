[build]
builder = "dockerfile"
dockerfilePath = "./Dockerfile"

[deploy]
startCommand = "java -jar /app/main.jar"
healthcheckPath = "/fhir/metadata"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
region = "us-east"

[environment]
PORT = "8080"
SERVER_PORT = "8080"
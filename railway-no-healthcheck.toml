[build]
builder = "dockerfile"
dockerfilePath = "./Dockerfile"

[deploy]
# Disable health check to see if server starts
# healthcheckPath = "/fhir/metadata"
# healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1

[environment]
PORT = "8080"
server.port = "8080"
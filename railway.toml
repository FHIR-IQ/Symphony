[build]
builder = "dockerfile"
dockerfilePath = "hapi-server/Dockerfile"
buildContext = "hapi-server"

[deploy]
startCommand = "java -jar /app/main.jar"
healthcheckPath = "/fhir/metadata"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "hapi-server"
root = "hapi-server"